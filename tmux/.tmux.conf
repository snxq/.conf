# enable mouse and keep Emacs-style copy-mode keys
set-option -g mouse on
setw -g mode-keys emacs

# replace C-b with C-t
set -g prefix C-t
unbind C-b
unbind C-a
bind C-t send-prefix

# reload the symlinked user config directly
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# avoid unnecessary status redraws unless second-level data is shown
set -g status-interval 5

# disable activity monitoring to avoid noisy window markers
setw -g monitor-activity off

# keep tmux defaults for copy-mode and paste-buffer
# add a convenient extra shortcut and familiar pane navigation
bind Space copy-mode
unbind-key b
unbind-key f
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# agent-deck configuration
# agent-deck-tmux-config-version: 2
# Added by agent-deck installer - 2026-03-04
# https://github.com/asheshgoplani/agent-deck

# Terminal with true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm*:Tc:smcup@:rmcup@"
set -ag terminal-overrides ",*256col*:Tc"

# Performance
set -sg escape-time 0
set -g history-limit 50000

# Auto-enter copy-mode when scrolling up
bind-key -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# Scroll bindings in copy-mode for both key tables
bind-key -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X scroll-down
bind-key -T copy-mode WheelUpPane send-keys -X scroll-up
bind-key -T copy-mode WheelDownPane send-keys -X scroll-down

# Clipboard integration on macOS
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
